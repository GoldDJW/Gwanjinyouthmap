<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>광진구 청소년자원지도 실무자용</title><link rel="stylesheet" href="assets/style.css"><script src="config.js"></script><script src="data/institutions.js"></script><script src="data/gwangjin_boundary.js"></script><script src="assets/common.js"></script></head><body>
<button class="mobile-menu" id="menu">☰</button><div class="app"><aside class="sidebar" id="side"><div class="hero"><h1>광진구 청소년자원지도</h1><p>실무자용 · 기관분포, 동일건물 목록, 행정동 우선도, 생활권과 공백지역 분석</p><div class="toplinks"><a href="youth_map.html">청소년용</a><a href="index.html">시작화면</a></div></div>
<section class="panel"><div id="dataStatus" class="status">기관 데이터를 확인하고 있습니다.</div><div id="boundaryStatus" class="status" style="margin-top:7px">행정동 경계를 확인하고 있습니다.</div></section>
<section class="panel"><h2>분석 화면</h2><div class="tabs"><button class="tab active" data-view="institutions">기관지도</button><button class="tab" data-view="priority">행정동 우선도</button><button class="tab" data-view="catchment">10분 생활권</button><button class="tab" data-view="gap">공백지역</button></div></section>
<section class="panel"><h2>지도 필터</h2><input id="search" class="search" placeholder="기관명·주소·대상 검색"><h3>서비스</h3><div class="checks" id="svcChecks"><label class="check all-check"><input type="checkbox" id="svcAll">전체</label><label class="check"><input type="checkbox" data-svc="상담"><span class="service-dot" style="background:#4E79A7"></span>상담</label><label class="check"><input type="checkbox" data-svc="돌봄"><span class="service-dot" style="background:#59A14F"></span>돌봄</label><label class="check"><input type="checkbox" data-svc="교육"><span class="service-dot" style="background:#F28E2B"></span>교육</label><label class="check"><input type="checkbox" data-svc="위기"><span class="service-dot" style="background:#E15759"></span>위기</label><label class="check"><input type="checkbox" data-svc="활동"><span class="service-dot" style="background:#B07AA1"></span>활동</label></div><div id="serviceHint" class="status warn" style="margin-top:8px">전체 또는 서비스 분야를 선택해야 기관이 표시됩니다.</div><h3>이용·지역</h3><div class="row2"><select id="usage" class="select"><option value="all">전체 이용구분</option><option value="청소년이용">청소년이용</option><option value="연계이용">연계이용</option></select><select id="dong" class="select"><option value="all">전체 행정동</option></select></div><div class="checks" style="margin-top:8px"><label class="check"><input id="external" type="checkbox">외부연계 표시</label><label class="check"><input id="school" type="checkbox" checked>학교 포함</label></div></section>
<section class="panel"><div class="stats"><div class="stat"><b id="sInst">0</b><span>표시 기관</span></div><div class="stat"><b id="sBuilding">0</b><span>표시 위치</span></div><div class="stat"><b id="sMulti">0</b><span>복수기관 건물</span></div></div></section>
<section class="panel"><h2>생활권·공백 분석</h2><select id="walkService" class="select"><option value="">분석 서비스 선택</option><option value="all">전체 서비스</option><option>상담</option><option>돌봄</option><option>교육</option><option>위기</option><option>활동</option></select><div class="row2" style="margin-top:8px"><select id="walkUsage" class="select"><option value="청소년이용">직접이용기관</option><option value="all">전체 이용구분</option><option value="연계이용">연계이용기관</option></select><div class="range-row"><input id="walkRange" type="range" min="500" max="900" step="50" value="700"><input id="walkMeters" type="number" min="500" max="900" step="50" value="700"></div></div><div id="analysisResult" class="status" style="margin-top:8px">분석 화면과 서비스를 선택하세요.</div></section>
<section class="panel"><h2>데이터 내보내기</h2><div class="btnrow"><button class="btn" id="expInst">기관 CSV</button><button class="btn" id="expBuilding">동일건물 CSV</button><button class="btn" id="expPriority">우선도 CSV</button><button class="btn" id="expGap">공백격자 GeoJSON</button></div></section>
<section class="panel"><div class="legend"><div class="legend-item"><span class="legend-swatch" style="background:#D1FAE5"></span>우선도 낮음</div><div class="legend-item"><span class="legend-swatch" style="background:#FEF3C7"></span>보통</div><div class="legend-item"><span class="legend-swatch" style="background:#FED7AA"></span>높음</div><div class="legend-item"><span class="legend-swatch" style="background:#FECACA"></span>우선 검토</div></div></section></aside><main class="map-wrap"><div id="map" class="map"></div><div id="mapNotice" class="map-notice warn">서비스 필터에서 전체 또는 분야를 선택하세요.</div></main></div><script src="assets/practitioner.js"></script></body></html>
