<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>광진구 청소년 서비스 자원지도</title><link rel="stylesheet" href="assets/style.css"><script src="config.js"></script><script src="data/institutions.js"></script></head><body><main class="home"><div class="home-wrap"><h1>광진구 청소년 서비스 자원지도</h1><p>기존 기관 목록과 서비스 분류를 유지하면서 카카오 지도로 위치와 기관정보를 확인합니다. 기관 데이터는 사이트에 포함되어 자동으로 불러옵니다.</p><div class="home-cards"><a class="home-card" href="youth_map.html"><h2>청소년용 서비스 찾기</h2><p>상담·돌봄·교육·위기·활동 서비스를 쉽고 빠르게 찾습니다.</p><b>청소년용 화면 열기 →</b></a><a class="home-card" href="practitioner_map.html"><h2>실무자용 관리·분석</h2><p>기관 분포, 행정동 우선도, 생활권, 공백지역과 동일건물 기관목록을 분석합니다.</p><b>실무자용 화면 열기 →</b></a></div><div id="ready" class="config-alert"></div></div></main><script>const c=(window.GWANGJIN_INSTITUTIONS||[]).length,k=window.GWANGJIN_MAP_CONFIG?.kakaoJavaScriptKey||'';const el=document.getElementById('ready');if(c&&k&&!/YOUR_|입력|발급/.test(k)){el.style.background='#e9f7f1';el.style.borderColor='#b8e0d0';el.style.color='#176146';el.textContent=`기관 ${c}개 자동 로딩 준비 완료 · 카카오 지도 키 설정 완료`;}else{el.innerHTML=`현재 템플릿 상태입니다. ${c?`기관 ${c}개 데이터는 포함되었습니다.`:'기관 데이터가 아직 포함되지 않았습니다.'} ${k&&!/YOUR_|입력|발급/.test(k)?'카카오 키는 설정되었습니다.':'카카오 JavaScript 키 설정이 필요합니다.'}<br><b>package_builder.html</b>에서 원본 엑셀과 키를 입력하면 공개용 ZIP을 만들 수 있습니다.`}</script></body></html>
